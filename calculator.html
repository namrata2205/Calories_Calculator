<html lang="en">
<head>
  <meta charset="UTF-8">

<body>

<header>

    <a href="index.html">Home</a>

    <a href="food.html">Food Tracker</a>
    <a href="tips.html">Tips</a>
    <a href="contact.html">Contact</a>
  </nav>

<section class="calc-section">
  <h2>Calculate Your Daily Calorie Needs</h2>
  <p>Fill out the form below to know your ideal daily calorie intake.</p>

 <form>
  <label for="gender">Gender:</label>
  <select id="gender" name="gender">
    <option>--Select--</option>
    <option>Male</option>
    <option>Female</option>
    <option>Other</option>
  </select>
  <br><br>

  <label for="age">Age (years):</label>
  <input type="number" id="age" name="age" placeholder="Enter your age">
  <br><br>

  <label for="height">Height (cm):</label>
  <input type="number" id="height" placeholder="Enter your height in cm">
  <br><br>

  <label for="weight">Weight (kg):</label>
  <input type="number" id="weight" placeholder="Enter your weight in kg">
  <br><br>

  <label for="activity">Activity Level:</label>
  <select id="activity" name="activity">
    <option>--Select Activity--</option>
    <option>Sedentary (little or no exercise)</option>
    <option>Lightly Active (1-3 days/week)</option>
    <option>Moderately Active (3-5 days/week)</option>
    <option>Very Active (6-7 days/week)</option>
    <option>Extremely Active (hard physical work)</option>
  </select>
  <br><br>

  <label for="goal">Goal:</label>
  <select id="goal" name="goal">
    <option>--Select Goal--</option>
    <option>Lose Weight</option>
    <option>Maintain Weight</option>
    <option>Gain Weight</option>
  </select>
  <br><br>

  <label for="bodytype">Body Type:</label>
  <select id="bodytype" name="bodytype">
    <option>--Select Body Type--</option>
    <option>Ectomorph (Naturally Lean)</option>
    <option>Mesomorph (Muscular Build)</option>
    <option>Endomorph (Easily Gains Fat)</option>
  </select>
  <br><br>

  <div class="inline-field">
  <label for="diet">Preferred Diet Type:</label>
  <select id="diet" name="diet">
    <option>--Select Diet--</option>
    <option>Vegetarian</option>
    <option>Non-Vegetarian</option>
    <option>Vegan</option>
  </select>
</div>

    <input type="submit" value="Calculate">
  </form>
<div id="resultBox" class="alert d-none mt-3"></div>
</section>

<footer>
  <p>© 2025 Calories Calculator | Designed by Namrata Thorat</p>
</footer>

</body>
</html>
